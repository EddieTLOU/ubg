<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTube Games | Unblocked Hub</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-color: #ff3333;
            --accent-glow: #ff0000;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 50px 20px 20px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-main);
            text-shadow: 0 0 12px var(--accent-glow), 0 0 25px var(--accent-glow);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .search-container input {
            width: 100%;
            padding: 15px 25px;
            font-size: 1rem;
            background-color: var(--card-bg);
            border: 2px solid #252525;
            border-radius: 30px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 60px 20px;
            box-sizing: border-box;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .game-thumbnail {
            width: 100%;
            height: 160px;
            background-color: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid #222;
        }

        /* Styling for the emoji/text fallback icon */
        .game-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
        }

        .game-info {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to top, #0f0f0f, var(--card-bg));
        }

        .game-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>NetTube Games</h1>
        <p class="subtitle">Fast, clean, unblocked arcade action.</p>
        
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search your games..." onkeyup="filterGames()">
        </div>
    </header>

    <main>
        <div class="games-grid" id="gamesGrid">
            
            <!-- GAME 1: BASKETBALL STARS -->
            <a href="games/basketball-stars/index.html" class="game-card">
                <div class="game-thumbnail">
                    <span class="game-icon">🏀</span>
                </div>
                <div class="game-info">
                    <h3 class="game-title">Basketball Stars</h3>
                </div>
            </a>

            <!-- You can easily add more game cards right below this line in the future! -->

        </div>
    </main>

    <script>
        // Smooth local search functionality
        function filterGames() {
            const input = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('gamesGrid');
            const cards = grid.getElementsByClassName('game-card');

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('game-title')[0].innerText;
                if (title.toLowerCase().indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
